        :root {

            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --text-color: #333;
            --bg-color: #f9fafb;
            --border-color: #e5e7eb;
            --sidebar-width: 300px;
        }
        body {

            margin: 0;

            line-height: 1.6;
        }
        .container {
            display: flex;
            max-width: 1450px;
            margin: 20px auto;
            background-color: #fff;

            border-radius: 12px;
            overflow: hidden;
            height: 90vh;

            width: var(--sidebar-width);
            background-color: #f3f4f6;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;

        .sidebar-header {

            background-color: #1f2937;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            position: sticky;

            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-content { padding: 15px 20px; }
        .sidebar-content h3 {
            font-size: 1.1rem;
            margin: 15px 0 10px 0;
            color: #1f2937;
            padding-bottom: 8px;
            border-bottom: 2px solid #d1d5db;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: color 0.2s;

        .sidebar-content h3:first-child { margin-top: 0; }
        .sidebar-content h3:hover { color: var(--primary-color); }
        .sidebar-content h3 .chevron { font-size: 0.85rem; transition: transform 0.3s ease; }

        .c-tag-1 { background-color: #fce7f3; color: #db2777; border: 1px solid #fbcfe8; }

        .cart-badge { background-color: #ef4444; color: white; border-radius: 50%; padding: 2px 10px; font-size: 1rem; }

            .sidebar-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); max-height: 400px; }
            .view-wrapper { flex-direction: column; overflow: visible; }
            .main-content { padding: 30px 20px; }
            .sidebar-right { width: 100%; border-left: none; border-top: 1px solid var(--border-color); padding: 30px 20px; }
            .floating-cart { bottom: 20px; right: 20px; padding: 12px 20px; font-size: 1rem; }

        @media print {
            body { background-color: #ffffff; }

            .sidebar-right { width: 100% !important; padding: 20px 0 !important; border: none !important; background: transparent !important; page-break-before: always; }

            .wish-del-btn { display: none !important; }
        }
    </style>
</head>

    function toggleWish(subjectName) {
        const idx = myWishlist.indexOf(subjectName);
        if (idx > -1) {
            myWishlist.splice(idx, 1);

            myWishlist.push(subjectName);
        }
        localStorage.setItem('myWishlist', JSON.stringify(myWishlist));
        updateCartCount();

        if(btn && btn.getAttribute('data-subject') === subjectName) {

        "사회문제 탐구": {

        "기후변화와 지속가능한 세계": {

        "과학탐구실험1·2": {

        },
        "물리학": {
            goal: "‘물리학’은 힘과 운동, 전기와 자기, 빛과 소리 등 우리 주변 자연 현상의 기본적인 원리를 명쾌하고 체계적으로 이해하는 일반 선택 과목이다. 복잡해 보이는 자연의 규칙을 수학적 모델과 물리적 개념으로 분석해보며 논리적인 과학적 문제 해결력을 기르고, 반도체나 우주항공 등 첨단 과학 기술 발전의 든든한 토대를 쌓는다.",
            contents: [

        },
        "화학": {
            goal: "‘화학’은 우리 주변 물질의 성질, 구조, 변화 과정을 원자와 분자라는 미시적 수준에서 과학적으로 탐구하는 일반 선택 과목이다. 눈에 보이지 않는 입자들의 결합과 반응 원리를 이해함으로써, 첨단 신소재, 환경 보호, 신약 개발 등 인류 문명의 발전에 직접적으로 기여하는 화학의 놀라운 유용성과 가치를 배운다.",

            careers: "화학공학엔지니어, 화장품(조향)개발자, 제약회사연구원, 재료/신소재공학자, 국과수과학수사요원, 환경영향평가사", majors: "화학과, 화학공학과, 생명화학공학과, 신소재공학과, 약학과, 응용화학과, 화학교육과"
        },
        "생명과학": {
            goal: "‘생명과학’은 우리 몸을 포함한 생명체의 정교한 구조와 신비로운 생명 현상의 작동 원리를 깊이 있게 탐구하는 일반 선택 과목이다. 인체 생리부터 유전, 생태계까지 폭넓은 지식을 바탕으로 인류가 직면한 난치성 질병, 생태계 파괴, 식량 및 환경 문제 등을 과학적이면서도 따뜻한 생명 윤리의 시각으로 해결할 수 있는 소양을 기른다.",
            contents: [

            careers: "의사, 약사, 수의사, 제약회사신약개발연구원, 생명공학(바이오)엔지니어, 생태복원전문가, 보건및위생전문가", majors: "의예과, 치의예과, 약학과, 수의예과, 생명과학과, 생명공학과, 간호학과, 임상병리학과, 생물교육과"
        },
        "지구과학": {
            goal: "‘지구과학’은 우리가 살고 있는 고체 지구, 해양과 대기, 그리고 거대한 우주의 역동적인 변화 과정을 거시적인 관점에서 탐구하는 일반 선택 과목이다. 화산, 지진, 기후 변화 등 인간 삶에 영향을 미치는 자연재해를 과학적으로 이해하고, 천문학적 현상에 대한 경이로움과 호기심을 우주 공간으로 확장한다.",

            careers: "기상청연구관, 환경컨설턴트, 천문학자, 해양자원탐사전문가, 지질학자, 항공기상분석관, 인공위성데이터분석가", majors: "지구과학과, 대기과학과, 해양학과, 지질학과, 천문우주학과, 환경공학과, 지구과학교육과"

        "역학과 에너지": {
            goal: "‘역학과 에너지’는 물리학의 핵심이자 공학의 기초인 역학적 지식을 한층 심화하여 탐구하는 진로 선택 과목이다. 다양한 물체의 운동, 열 현상, 그리고 상대성 이론까지 다루며, 기계 설계 및 항공 우주 산업에 필수적인 정량적 계산 및 고급 논리적 추론 능력을 기른다.",

        "화학 반응의 세계": {

        "세포와 물질대사": {
            goal: "‘세포와 물질대사’는 생명체의 기본 단위인 세포의 미세 구조와 그 안에서 일어나는 복잡한 화학 반응(물질대사)을 분자 수준에서 탐구하는 진로 선택 과목이다. 인체 생리학 및 바이오 산업의 뼈대가 되는 전문 지식을 습득하여 의약 및 생명공학 분야로 나아갈 역량을 다진다.",

            careers: "의사/약사, 바이오의약품개발자, 생명과학연구원, 생화학자, 농업/식품공학자", majors: "의예과, 약학과, 생명과학과, 생화학과, 분자생물학과, 식품생명공학과"

        "행성우주과학": {

            ],
            careers: "양자컴퓨터연구원, 첨단반도체설계자, 나노소자연구원, 기초물리학자, 전기전자장비엔지니어", majors: "물리학과, 전기전자공학과, 나노공학과, 양자정보공학과, 반도체공학과, 신소재공학과"

        "물질과 에너지": {

        "기후변화와 환경생태": {

    function parseListString(strOrArray) {
        if (Array.isArray(strOrArray)) return strOrArray;
        if (!strOrArray) return [];
        return strOrArray.split(',').map(item => item.trim()).filter(item => item !== '');
    }

    function buildSidebar() {
        const sidebar = document.getElementById('sidebar-content');
        const groups = {};
        const groupOrder = ["국어", "수학", "영어", "사회", "과학", "체육", "예술", "기술·가정", "제2외국어", "교양", "정보"];
        const typeOrder = { "공통": 1, "일반": 2, "진로": 3, "융합": 4 };
        
        subjectsRaw.forEach(sub => {
            if(!groups[sub.g]) groups[sub.g] = [];
            groups[sub.g].push(sub);
        });

        let html = '';
        groupOrder.forEach(groupName => {
            if(!groups[groupName]) return;
            groups[groupName].sort((a, b) => typeOrder[a.t] - typeOrder[b.t]);

            const listId = `list-${groupName}`;
            html += `
                <h3 onclick="toggleCategory('${listId}', this)">
                    <span>📌 ${groupName} 교과군</span>
                    <span class="chevron">▼</span>
                </h3>
                <ul class="subject-list" id="${listId}">
            `;
            groups[groupName].forEach(sub => {
                let tagClass = '';
                if(sub.t === '공통') tagClass = 'tag-com';
                else if(sub.t === '일반') tagClass = 'tag-gen';
                else if(sub.t === '진로') tagClass = 'tag-car';
                else if(sub.t === '융합') tagClass = 'tag-fus';

                html += `
                    <li>
                        <a class="tab-btn" onclick="renderSubject(this, '${sub.n}', '${sub.g}', '${sub.t}')">
                            ${sub.n}
                            <span class="menu-tag ${tagClass}">${sub.t}</span>
                        </a>
                    </li>
                `;
            });
            html += `</ul>`;
        });
        sidebar.innerHTML = html;
        updateCartCount();
    }

    function toggleCategory(listId, headerElement) {
        const list = document.getElementById(listId);
        if(list) {
            list.classList.toggle('collapsed');
            headerElement.classList.toggle('collapsed');
        }
    }

    function getEvalRule(subjectName, groupName, subjectType) {
        let evalText = '5단계 (A~E) / 석차 5등급 산출'; 
        let suneungClass = 'excluded';
        let suneungText = '2028 수능 미포함 ✕';

        const csatCommon = ["공통국어1·2", "공통수학1·2", "공통영어1·2", "통합사회1·2", "통합과학1·2", "한국사1·2"];
        const csatChoice = ["문학", "화법과 언어", "독서와 작문", "대수", "미적분Ⅰ", "확률과 통계", "영어Ⅰ", "영어Ⅱ"];
        
        if (csatChoice.includes(subjectName)) {
            suneungClass = 'included';
            suneungText = '2028 수능 출제 과목 ◯ (공통/선택)';
        } else if (csatCommon.includes(subjectName)) {
            if (subjectName === "통합사회1·2" || subjectName === "통합과학1·2" || subjectName === "한국사1·2") {
                suneungClass = 'included';
                suneungText = '2028 수능 출제 과목 ◯ (공통)';
            } else {
                suneungClass = 'indirect';
                suneungText = '2028 수능 간접 출제 범위';
            }
        }

        if (groupName === '국어' || groupName === '수학' || groupName === '영어' || groupName === '사회' || groupName === '과학' || groupName === '정보') {
            evalText = '5단계 (A~E) / 석차 5등급 산출';
            if (subjectName.includes('실험')) {
                evalText = '5단계 (A~E) / 석차 등급 미산출'; 
            }
        }
        
        if (groupName === '체육' || groupName === '예술') {
            if (subjectName.includes('전공 실기')) evalText = '5단계 (A~E) / 석차 5등급 산출'; 
            else evalText = '3단계 (A~C) / 석차 등급 미산출';
        } else if (groupName === '교양') {
            evalText = 'P/F (Pass/Fail) / 석차 등급 미산출';
        } 

        if (subjectType === '공통') {
            if (subjectName.includes('과학탐구실험')) evalText = '3단계 (A~C) / 석차 등급 미산출';
            else evalText = '5단계 (A~E) / 석차 5등급 산출';
        }

        return { evalText, suneungClass, suneungText };
    }

    function showCart() {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const wrapper = document.getElementById('view-wrapper');
        
        if(myWishlist.length === 0) {
            wrapper.innerHTML = `
                <div class="empty-state w-full" style="width: 100%;">
                    <div>🛒</div>
                    <h2>장바구니가 비어 있습니다.</h2>
                    <p>왼쪽 메뉴에서 과목을 찾아 <strong>[♡ 찜하기]</strong> 버튼을 눌러 담아보세요!</p>
                </div>
            `;
            return;
        }
        
        let listHtml = '';
        let sortedWishlist = myWishlist.map(name => subjectsRaw.find(s => s.n === name)).filter(Boolean);
        
        const groupOrder = ["국어", "수학", "영어", "사회", "과학", "체육", "예술", "기술·가정", "제2외국어", "교양", "정보"];
        const typeOrder = { "공통": 1, "일반": 2, "진로": 3, "융합": 4 };
        
        sortedWishlist.sort((a,b) => {
            if (a.g !== b.g) return groupOrder.indexOf(a.g) - groupOrder.indexOf(b.g);
            return typeOrder[a.t] - typeOrder[b.t];
        });

        sortedWishlist.forEach(subData => {
            let tagClass = '';
            if(subData.t === '공통') tagClass = 'tag-com';
            else if(subData.t === '일반') tagClass = 'tag-gen';
            else if(subData.t === '진로') tagClass = 'tag-car';
            else if(subData.t === '융합') tagClass = 'tag-fus';

            const rules = getEvalRule(subData.n, subData.g, subData.t);

            listHtml += `
                <div class="wishlist-item">
                    <div>
                        <span class="menu-tag ${tagClass}" style="margin-right:12px; padding:4px 10px;">${subData.t}</span>
                        <span style="font-weight:900; font-size:1.3rem; color:#111;">${subData.n}</span>
                        <span style="color:#6b7280; font-size:1rem; margin-left:12px; font-weight:500;">(${subData.g} 교과군)</span>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span style="font-size:0.85rem; color:#4b5563; background:#f3f4f6; padding:4px 8px; border-radius:4px;">${rules.evalText}</span>
                        <button class="wish-del-btn" onclick="toggleWish('${subData.n}'); showCart();">삭제</button>
                    </div>
                </div>
            `;
        });

        wrapper.innerHTML = `
            <div class="main-content" style="width:100%; max-width:900px; margin:0 auto; display:flex; flex-direction:column; height:100%;">
                <header class="subject-header" style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:3px solid #111; padding-bottom:20px;">
                    <div>
                        <span class="subject-category" style="background-color:#1f2937; margin-bottom:15px;">나의 장바구니</span>
                        <h1 class="subject-title" style="margin-bottom:5px;">선택과목 찜 목록</h1>
                        <p class="section-desc" style="margin:0;">내가 찜한 과목들을 모아보고, 인쇄하여 진로 상담에 활용해 보세요!</p>
                    </div>
                    <button class="print-hide" onclick="window.print()" style="background-color:#3b82f6; color:white; padding:12px 24px; border-radius:10px; font-weight:900; border:none; cursor:pointer; font-size:1.1rem; box-shadow:0 4px 6px rgba(59,130,246,0.3); transition:all 0.2s;">
                        🖨️ 인쇄하기
                    </button>
                </header>
                <div style="margin-top:20px; flex:1;">
                    ${listHtml}
                </div>
            </div>
        `;

    function renderSubject(btnElement, subjectName, groupName, subjectType) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        const wrapper = document.getElementById('view-wrapper');
        const rules = getEvalRule(subjectName, groupName, subjectType);

        let catClass = '';
        if (subjectType === '공통') catClass = 'cat-common';
        else if (subjectType === '일반') catClass = 'cat-general';
        else if(subjectType === '진로') catClass = 'cat-career';
        else if(subjectType === '융합') catClass = 'cat-fusion';

        let d = detailedData[subjectName];
        if (!d) {

                majors: [`${groupName} 관련 대학 전공 학과 전반`, "자율전공학부 및 융합학부", "사범대 및 교육과"]

                defaults = groupDefaults[groupName];

            else if(subjectType === '일반') dynamicGoal = `<b>${subjectName}</b> 과목은 ${groupName} 분야의 튼튼한 기초를 다지는 핵심 일반 선택 과목입니다. 교과서 속 기본 개념과 원리를 차근차근 이해하고, 이를 바탕으로 다양한 문제 상황을 논리적으로 분석하여 해결하는 힘을 기르는 데 중점을 둡니다.`;
            else if(subjectType === '진로') dynamicGoal = `<b>${subjectName}</b> 과목은 여러분의 적성과 진로에 맞추어 더 깊이 있는 학습을 할 수 있도록 돕는 진로 선택 과목입니다. ${groupName} 분야의 심층적인 내용과 최신 동향을 탐구하며, 실제 산업 현장이나 대학 전공 학습에서 요구되는 전문적인 문제 해결 능력을 기를 수 있습니다.`;

                    <h2 class="career-section-title">진로 및 진학 설계</h2>
                    
                    <h4 class="career-subtitle">관련 직업 분야</h4>
                    <div class="career-tags">
                        ${careerTagsHtml}
                    </div>
                    
                    <h4 class="major-subtitle">주요 관련 학과</h4>
                    <ul class="major-list">

                </div>
            </aside>
        `;

        wrapper.innerHTML = html;
    }

    window.onload = function() {
